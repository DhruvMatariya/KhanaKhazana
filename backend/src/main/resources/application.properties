spring.application.name=backend
# Load .env when running from backend/ or repo root.
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]
# Use Render env var in production and .env locally.
spring.data.mongodb.uri=${MONGODB_URI:}
server.port=${PORT:8080}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
groq.api.key=${GROQ_API_KEY:}
groq.api.model=${GROQ_API_MODEL:llama-3.3-70b-versatile}
